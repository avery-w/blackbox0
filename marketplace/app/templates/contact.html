{% extends "base.html" %}
{% block content %}
<div class="section">
    <div class="section-container" style="max-width: 700px; margin: 0 auto;">
        <h1 style="font-size: 2.5rem; font-weight: 800; text-align: center; margin-bottom: 0.5rem;">Contact Us</h1>
        <p style="text-align: center; color: var(--gray-500); margin-bottom: 2rem;">We'd love to hear from you! Send us a message.</p>

        <div style="background: var(--white); border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); padding: 2.5rem;">
            <form method="POST" action="#">
                <div class="form-row">
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" class="form-control" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Your Email</label>
                        <input type="email" class="form-control" placeholder="john@example.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" class="form-control" placeholder="How can we help?" required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea class="form-control" rows="5" placeholder="Your message..." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg"><i class="fas fa-paper-plane"></i> Send Message</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<div class="section">
    <div class="section-container">
        <div class="form-container" style="max-width: 600px;">
            <h2 class="form-title"><i class="fas fa-id-card"></i> My Profile</h2>
            <form method="POST" action="">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" class="form-control" value="{{ current_user.username }}" disabled>
                    <span class="form-text">Username cannot be changed.</span>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" value="{{ current_user.email }}" disabled>
                    <span class="form-text">Email cannot be changed.</span>
                </div>
                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" name="full_name" id="full_name" class="form-control" value="{{ current_user.full_name or '' }}" placeholder="Your full name">
                </div>
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="text" name="phone" id="phone" class="form-control" value="{{ current_user.phone or '' }}" placeholder="Phone number">
                </div>
                <div class="form-group">
                    <label for="address">Address</label>
                    <textarea name="address" id="address" class="form-control" rows="3" placeholder="Your shipping address">{{ current_user.address or '' }}</textarea>
                </div>
                <div class="form-group">
                    <label>Account Type</label>
                    <div>
                        {% if current_user.is_seller %}
                        <span class="status-badge status-delivered"><i class="fas fa-store"></i> Seller</span>
                        {% else %}
                        <span class="status-badge status-pending"><i class="fas fa-user"></i> Buyer</span>
                        {% endif %}
                        {% if current_user.is_admin %}
                        <span class="status-badge status-processing"><i class="fas fa-shield-alt"></i> Admin</span>
                        {% endif %}
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block mt-3"><i class="fas fa-save"></i> Update Profile</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
